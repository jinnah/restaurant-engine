# CI runs exactly the documented commands (ADR-006): the local gate and the
# CI gate are the same list. The backend job arrived with Milestone 1A; the
# integrated matrix (frontend builds, generated-client drift) lands in M1C.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (pinned pnpm)
        run: corepack enable

      - name: Install workspace tooling
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Verify LF normalization
        run: |
          bad="$(git ls-files --eol | grep -E '^i/(crlf|mixed)' || true)"
          if [ -n "$bad" ]; then
            echo "Files stored with non-LF line endings:"
            echo "$bad"
            exit 1
          fi

      - name: Verify no committed environment files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\..+)?$' | grep -v '\.env\.example$'; then
            echo "An environment file is committed; remove it."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack (pinned pnpm)
        run: corepack enable

      - name: Set up Node.js with pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production builds
        run: pnpm build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Same pinned image as compose.yaml; mapped to 5433 to match the
      # documented development URL, so tests run identically local and CI.
      postgres:
        image: postgres:17.10
        env:
          POSTGRES_USER: restaurant_dev
          POSTGRES_PASSWORD: restaurant_dev_only
          POSTGRES_DB: restaurant_engine
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U restaurant_dev -d restaurant_engine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv (pinned)
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy app tests

      - name: pytest (unit, API, and PostgreSQL integration)
        run: uv run pytest
