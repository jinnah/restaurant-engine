# Alembic configuration for the Restaurant Engine backend.
#
# The database URL is intentionally NOT configured here: migrations/env.py
# reads it from validated application settings (DATABASE_URL), and tests
# override it programmatically. Run from backend/:
#
#     uv run alembic upgrade head
#     uv run alembic revision -m "describe the change"

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os

# Ruff formats newly generated revision files to the repository baseline.
[post_write_hooks]
hooks = ruff_fix, ruff_format
ruff_fix.type = module
ruff_fix.module = ruff
ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = module
ruff_format.module = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# Logging used by env.py.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
